<svg width="500" height="500" viewBox="80 20 520 520" xmlns="http://www.w3.org/2000/svg">
<defs>
  <clipPath id="macos"><rect x="90" y="30" width="500" height="500" rx="112"/></clipPath>
  <style>
    @keyframes dropIn    { 0%{transform:translateY(-20px) scale(0.9);opacity:0} 60%{transform:translateY(4px) scale(1.02)} 100%{transform:translateY(0) scale(1);opacity:1} }
    @keyframes earPopL   { 0%{transform:scale(0.5) rotate(-15deg);opacity:0} 70%{transform:scale(1.1) rotate(2deg)} 100%{transform:scale(1) rotate(0deg);opacity:1} }
    @keyframes earPopR   { 0%{transform:scale(0.5) rotate(15deg);opacity:0} 70%{transform:scale(1.1) rotate(-2deg)} 100%{transform:scale(1) rotate(0deg);opacity:1} }
    @keyframes eyePop    { 0%{transform:scale(0.5);opacity:0} 65%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
    @keyframes fadeIn    { 0%{opacity:0} 100%{opacity:1} }
    @keyframes float     { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    @keyframes blinkBoth { 0%,46%,52%,100%{transform:scaleY(1)} 49%{transform:scaleY(0.07)} }
    @keyframes shimmer   { 0%,100%{opacity:0.07} 50%{opacity:0.14} }

    .bg-rect { animation: fadeIn 0.2s ease both; }
    .bg-glow { animation: fadeIn 0.3s ease 0.1s both; }
    .ear-l   { transform-origin:208px 162px; animation: earPopL 0.4s cubic-bezier(.34,1.56,.64,1) 0.15s both; }
    .ear-r   { transform-origin:472px 162px; animation: earPopR 0.4s cubic-bezier(.34,1.56,.64,1) 0.2s both; }
    .head    { transform-origin:340px 310px; animation: dropIn 0.5s cubic-bezier(.34,1.2,.64,1) 0.05s both; }
    .eye-l   { transform-origin:287px 295px; animation: eyePop 0.3s cubic-bezier(.34,1.56,.64,1) 0.4s both, blinkBoth 5s ease-in-out 2s infinite; }
    .eye-r   { transform-origin:393px 295px; animation: eyePop 0.3s cubic-bezier(.34,1.56,.64,1) 0.5s both, blinkBoth 5s ease-in-out 2s infinite; }
    .face    { animation: fadeIn 0.3s ease 0.6s both; }
    .floater { animation: float 4s ease-in-out 1s infinite; }
    .shine   { animation: shimmer 3s ease-in-out 1.5s infinite; }
  </style>
</defs>

<g class="bg-rect">
  <rect x="90" y="30" width="500" height="500" rx="112" fill="#1C1C1E"/>
</g>
<g class="bg-glow" clip-path="url(#macos)">
  <circle cx="340" cy="300" r="300" fill="#2C2C2E" opacity="0.85"/>
  <ellipse cx="340" cy="570" rx="260" ry="130" fill="#181818" opacity="0.8"/>
  <ellipse cx="340" cy="100" rx="200" ry="100" fill="#3A3A3C" opacity="0.25"/>
</g>

<g class="floater">
  <g class="ear-l">
    <circle cx="208" cy="162" r="64" fill="#C8A472" stroke="#8B6030" stroke-width="5"/>
    <circle cx="208" cy="162" r="38" fill="#E2C090" opacity="0.75"/>
    <circle cx="200" cy="154" r="10" fill="white" opacity="0.12"/>
  </g>
  <g class="ear-r">
    <circle cx="472" cy="162" r="64" fill="#C8A472" stroke="#8B6030" stroke-width="5"/>
    <circle cx="472" cy="162" r="38" fill="#E2C090" opacity="0.75"/>
    <circle cx="464" cy="154" r="10" fill="white" opacity="0.12"/>
  </g>
  <g class="head">
    <circle cx="340" cy="310" r="188" fill="#C8A472" stroke="#8B6030" stroke-width="6"/>
    <ellipse cx="300" cy="210" rx="60" ry="36" fill="white" opacity="0.09" class="shine"/>
    <ellipse cx="340" cy="390" rx="110" ry="88" fill="#DDB882" opacity="0.7"/>
  </g>
  <g class="eye-l">
    <rect x="248" y="258" width="78" height="74" rx="14" fill="#F0EEF8" stroke="#2C2C2E" stroke-width="3"/>
    <rect x="281" y="266" width="14" height="14" fill="#7F77DD" rx="2"/>
    <rect x="267" y="280" width="14" height="14" fill="#7F77DD" rx="2"/>
    <rect x="281" y="280" width="14" height="14" fill="#26215C" rx="2"/>
    <rect x="295" y="280" width="14" height="14" fill="#7F77DD" rx="2"/>
    <rect x="281" y="294" width="14" height="14" fill="#7F77DD" rx="2"/>
    <rect x="267" y="266" width="14" height="14" fill="#AFA9EC" rx="2" opacity="0.45"/>
    <rect x="295" y="266" width="14" height="14" fill="#AFA9EC" rx="2" opacity="0.45"/>
    <rect x="267" y="294" width="14" height="14" fill="#AFA9EC" rx="2" opacity="0.45"/>
    <rect x="295" y="294" width="14" height="14" fill="#AFA9EC" rx="2" opacity="0.45"/>
    <rect x="269" y="268" width="8" height="8" fill="white" opacity="0.9" rx="1"/>
  </g>
  <g class="eye-r">
    <rect x="354" y="258" width="78" height="74" rx="14" fill="#F0EEF8" stroke="#2C2C2E" stroke-width="3"/>
    <rect x="387" y="266" width="14" height="14" fill="#7F77DD" rx="2"/>
    <rect x="373" y="280" width="14" height="14" fill="#7F77DD" rx="2"/>
    <rect x="387" y="280" width="14" height="14" fill="#26215C" rx="2"/>
    <rect x="401" y="280" width="14" height="14" fill="#7F77DD" rx="2"/>
    <rect x="387" y="294" width="14" height="14" fill="#7F77DD" rx="2"/>
    <rect x="373" y="266" width="14" height="14" fill="#AFA9EC" rx="2" opacity="0.45"/>
    <rect x="401" y="266" width="14" height="14" fill="#AFA9EC" rx="2" opacity="0.45"/>
    <rect x="373" y="294" width="14" height="14" fill="#AFA9EC" rx="2" opacity="0.45"/>
    <rect x="401" y="294" width="14" height="14" fill="#AFA9EC" rx="2" opacity="0.45"/>
    <rect x="375" y="268" width="8" height="8" fill="white" opacity="0.9" rx="1"/>
  </g>
  <g class="face">
    <ellipse cx="340" cy="358" rx="18" ry="13" fill="#8B6030" stroke="#6A4820" stroke-width="2"/>
    <ellipse cx="340" cy="355" rx="9" ry="5" fill="#A07840" opacity="0.5"/>
    <ellipse cx="264" cy="378" rx="30" ry="18" fill="#E8A0A8" opacity="0.45"/>
    <ellipse cx="416" cy="378" rx="30" ry="18" fill="#E8A0A8" opacity="0.45"/>
    <path d="M318 398 Q340 414 362 398" fill="none" stroke="#8B6030" stroke-width="3.5" stroke-linecap="round"/>
  </g>
</g>
</svg>
